<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">CAD Guardian MicroStation DGN Workflows public runnable evaluation kit</title>
  <desc id="desc">Public runnable evaluation kit for seed, level, reference, and export readiness. cadguardian.com/microstation-automation-consulting</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07090d"/>
      <stop offset="0.54" stop-color="#0d121a"/>
      <stop offset="1" stop-color="#05070a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#69a8ff"/>
      <stop offset="1" stop-color="#f3b23c"/>
    </linearGradient>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#e2e8f0" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <path d="M-80 160H260L430 330H720L915 500H1360" fill="none" stroke="#69a8ff" stroke-width="18" stroke-linecap="square" stroke-opacity="0.14"/>
  <path d="M1280 86H1010L858 238H604L450 392H0" fill="none" stroke="#f3b23c" stroke-width="12" stroke-linecap="square" stroke-opacity="0.12"/>
  <rect x="64" y="56" width="1152" height="528" rx="20" fill="#0c1118" fill-opacity="0.82" stroke="#e2e8f0" stroke-opacity="0.16" filter="url(#softShadow)"/>
  <rect x="64" y="56" width="1152" height="8" fill="url(#accent)"/>
  <g transform="translate(96 96)">
    <rect x="0" y="0" width="174" height="48" rx="24" fill="#69a8ff" fill-opacity="0.16" stroke="#69a8ff" stroke-opacity="0.5"/>
    <text x="24" y="31" fill="#e6fffb" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="1.6">CAD GUARDIAN</text>
  </g>
  <text x="96" y="214" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="68" font-weight="900" letter-spacing="0">MicroStation DGN Workflows</text>
  <text x="96" y="280" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800" letter-spacing="0">Public runnable evaluation kit</text>
  <text x="96" y="338" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="500">Public runnable evaluation kit for seed, level, reference, and export readiness.</text>
  <g transform="translate(96 394)">
    <rect x="0" y="0" width="530" height="54" rx="12" fill="#111827" stroke="#e2e8f0" stroke-opacity="0.16"/>
    <text x="22" y="35" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="760">NAICS 541512 | SIC 7373 | CAD Guardian LLC</text>
  </g>
  <g transform="translate(96 470)">
    <text x="0" y="0" fill="#69a8ff" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="860">PUBLIC PROOF</text>
    <text x="0" y="36" fill="#dbeafe" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="650">DGN checks | seed files | levels | references | exports</text>
    <text x="0" y="76" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="520">Private customer artifacts are not exposed.</text>
  </g>
  <g transform="translate(864 404)">
    <rect x="0" y="0" width="308" height="112" rx="18" fill="#05070a" stroke="#69a8ff" stroke-opacity="0.35"/>
    <text x="28" y="42" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="820">Consulting path</text>
    <text x="28" y="74" fill="#69a8ff" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="760">cadguardian.com</text>
    <text x="28" y="98" fill="#dbeafe" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="680">/microstation-automation-consulting</text>
